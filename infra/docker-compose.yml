services:
  postgres:
    image: postgres:16-alpine
    container_name: saf-signal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saf_signal
      POSTGRES_USER: saf_signal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saf_signal -d saf_signal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saf-signal

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: saf-signal-api
    restart: unless-stopped
    environment:
      JETSCOPE_DATABASE_URL: postgresql+psycopg://saf_signal:${POSTGRES_PASSWORD}@postgres:5432/saf_signal
      JETSCOPE_ADMIN_TOKEN: ${JETSCOPE_ADMIN_TOKEN:?JETSCOPE_ADMIN_TOKEN is required}
      JETSCOPE_APP_ENV: production
      JETSCOPE_MARKET_REFRESH_INTERVAL_SECONDS: "600"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saf-signal

  web:
    image: node:20-alpine
    container_name: saf-signal-web
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../apps/web:/app:ro
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - JETSCOPE_API_BASE_URL=http://api:8000
    command: >
      sh -c "npm ci && npm run build && npm start"
    depends_on:
      - api
    networks:
      - saf-signal

  nginx:
    image: nginx:alpine
    container_name: saf-signal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - saf-signal

volumes:
  postgres-data:

networks:
  saf-signal:
    driver: bridge
