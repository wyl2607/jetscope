[alembic]
script_location = migrations
# SQLite is the frozen production engine (see docs/DEPLOYMENT_GUIDE.md). This URL
# is overridden at runtime from settings.database_url by migrations/env.py.
sqlalchemy.url = sqlite:///./data/market.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
