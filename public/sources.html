<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFvsOil · Sources</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="light" data-page="sources">
    <div id="site-header"></div>

    <main class="page-main">
      <section class="page-hero">
        <p class="eyebrow">Sources · 数据血缘</p>
        <h1>数据源健康与血缘</h1>
        <p class="hero-copy">每个源的状态、时间戳、来源地址都集中展示在本页。</p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>源状态摘要</h2>
        </div>
        <div id="source-summary"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>源对比</h2>
        </div>
        <div id="source-comparison"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>源详情卡片</h2>
        </div>
        <div id="source-grid"></div>
      </section>

      <section class="panel">
        <button id="refresh-btn" class="secondary-button">手动刷新</button>
      </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="/_shared/layout.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
