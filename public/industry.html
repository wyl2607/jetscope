<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFvsOil · Industry</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="light" data-page="industry">
    <div id="site-header"></div>

    <main class="page-main">
      <section class="page-hero">
        <p class="eyebrow">Industry · 行业转型</p>
        <h1>SAF 行业转型子页面</h1>
        <p class="hero-copy">
          该页面复用主应用状态（油价 / 碳价 / 补贴），不引入独立滑块；首页只保留现状快照，行业上下文集中放在这里。
        </p>
      </section>

      <section id="industry-dashboard" class="panel industry-dashboard-panel panel-wide" aria-labelledby="industry-dashboard-title">
        <div class="panel-head">
          <div>
            <h2 id="industry-dashboard-title">行业仪表盘（上下文面板）</h2>
            <p>国家/航司采用率为静态研究基线（as of 2026-Q1），按季度人工 review；不接外部采用率 API。</p>
          </div>
        </div>

        <div class="industry-dashboard">
          <div class="industry-signal-grid" id="industry-signal-cards" aria-live="polite"></div>

          <div class="industry-section">
            <h3>各国 SAF 政策推进</h3>
            <div class="industry-country-list" id="industry-countries" role="table"></div>
          </div>

          <div class="industry-section">
            <h3>主要航空公司 SAF 采用率</h3>
            <div class="industry-airline-list" id="industry-airlines" role="table"></div>
          </div>

          <details class="secondary-surface" open>
            <summary>原料路线就绪度与政策时间表</summary>
            <div class="secondary-surface-body">
              <div class="industry-section">
                <h4>原料路线转型就绪度</h4>
                <div class="industry-pathway-grid" id="industry-pathways"></div>
              </div>
              <div class="industry-section">
                <h4>关键政策里程碑（基于 marketData.timestamp 判定已过/未过）</h4>
                <ol class="industry-timeline" id="industry-timeline"></ol>
              </div>
            </div>
          </details>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="/_shared/layout.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
