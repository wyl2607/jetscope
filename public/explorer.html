<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFvsOil · Explorer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="light" data-page="explorer">
    <div id="site-header"></div>

    <main class="page-main">
      <section class="page-hero">
        <p class="eyebrow">Explorer · 参数工作台</p>
        <h1>盈亏平衡计算器</h1>
        <p class="hero-copy">三滑块 + 核心指标 + 竞争力列表。可分享参数全部走 URL query。</p>
        <div class="button-row">
          <button id="save-server-btn" class="secondary-button">保存到服务器</button>
          <button id="clear-server-btn" class="ghost-button">清空服务器保存</button>
          <button id="reset-btn" class="ghost-button">恢复发货默认</button>
          <button id="refresh-btn" class="secondary-button">刷新公开数据</button>
        </div>
      </section>

      <section class="panel">
        <div id="runtime-status" role="status" aria-live="polite" aria-atomic="true"></div>
        <label class="field checkbox-field runtime-refresh-field">
          <span>自动刷新</span>
          <div class="checkbox-row">
            <input id="auto-refresh" type="checkbox" />
            <small>每 10 分钟刷新一次公开数据</small>
          </div>
        </label>
      </section>

      <section class="panel panel-focus">
        <div class="panel-head">
          <h2>三滑块参数</h2>
          <p>可分享示例：/explorer?crude=120&carbon=150&subsidy=0.6</p>
        </div>
        <div class="formula-box" id="breakeven-formula">
          <code>P<sub>SAF有效</sub> = P<sub>SAF基础</sub> − Carbon × ΔCO₂ − Subsidy</code>
          <code>P<sub>jet(proxy)</sub> = slope × crude + intercept</code>
        </div>
        <div id="breakeven-controls" class="realtime-explorer">
          <div class="explorer-slider-stack">
            <div class="explorer-slider-block">
              <div class="explorer-slider-header">
                <span class="explorer-label">油价 ($/桶)</span>
                <span class="explorer-value" id="crude-display">80</span>
              </div>
              <div class="explorer-slider-track-row">
                <div class="explorer-slider-track">
                  <input id="crude-slider" type="range" min="20" max="180" value="80" step="1" />
                </div>
                <div class="explorer-slider-tail" id="crude-band">中位区间</div>
              </div>
              <input id="crude-input" class="explorer-number-input" type="number" step="0.1" min="0" />
            </div>

            <div class="explorer-slider-block">
              <div class="explorer-slider-header">
                <span class="explorer-label">碳价 ($/tCO₂)</span>
                <span class="explorer-value" id="carbon-display">90</span>
              </div>
              <div class="explorer-slider-track-row">
                <div class="explorer-slider-track">
                  <input id="carbon-slider" type="range" min="20" max="300" value="90" step="5" />
                </div>
                <div class="explorer-slider-tail" id="carbon-band">中位区间</div>
              </div>
              <input id="carbon-input" class="explorer-number-input" type="number" step="1" min="0" />
            </div>

            <div class="explorer-slider-block">
              <div class="explorer-slider-header">
                <span class="explorer-label">补贴 ($/L)</span>
                <span class="explorer-value" id="subsidy-display">0.50</span>
              </div>
              <div class="explorer-slider-track-row">
                <div class="explorer-slider-track">
                  <input id="subsidy-slider" type="range" min="0" max="1.5" value="0.50" step="0.05" />
                </div>
                <div class="explorer-slider-tail" id="subsidy-band">中性支持</div>
              </div>
              <input id="subsidy-input" class="explorer-number-input" type="number" step="0.01" min="0" />
            </div>
          </div>

          <div id="breakeven-core-metrics" aria-live="polite"></div>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>比较口径</span>
            <select id="benchmark-mode">
              <option value="crude-proxy">按 crude proxy</option>
              <option value="live-jet-spot">按 live jet spot</option>
            </select>
          </label>
          <label class="field">
            <span>原油来源</span>
            <select id="crude-source"></select>
          </label>
          <label class="field">
            <span>碳价来源</span>
            <select id="carbon-source"></select>
          </label>
          <label class="field">
            <span>Jet proxy slope</span>
            <input id="slope-input" type="number" step="0.0001" min="0" />
          </label>
          <label class="field">
            <span>Jet proxy intercept</span>
            <input id="intercept-input" type="number" step="0.001" min="0" />
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="quick-scenarios-row">
          <span class="quick-label">快速场景：</span>
          <button class="quick-scenario-btn" data-scenario="baseline-2026">基准</button>
          <button class="quick-scenario-btn" data-scenario="eu-ambition-2030">EU雄心</button>
          <button class="quick-scenario-btn" data-scenario="ira-extended-us">IRA</button>
          <button class="quick-scenario-btn" data-scenario="geopolitical-shock">地缘冲击</button>
          <button class="quick-scenario-btn" data-scenario="energy-crisis">能源危机</button>
          <button class="quick-scenario-btn" data-scenario="demand-collapse">需求崩塌</button>
        </div>
        <div id="realtime-cost-matrix" aria-live="polite" class="realtime-cost-grid"></div>
      </section>

      <section class="panel">
        <div id="breakeven-route-list" aria-live="polite"></div>
      </section>

      <section class="ops-grid">
        <div class="local-state-card" id="local-state"></div>
        <div class="local-state-card" id="source-lock-card"></div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="/_shared/layout.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
