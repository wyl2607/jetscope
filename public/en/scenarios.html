<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFvsOil · Scenarios</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="light" data-page="scenarios">
    <div id="site-header"></div>

    <main class="page-main">
      <section class="page-hero">
        <p class="eyebrow">Scenarios</p>
        <h1>Save, load, and compare scenarios</h1>
        <p class="hero-copy">Explorer states can be captured and replayed from one place.</p>
      </section>

      <section class="panel">
        <div class="button-row">
          <button id="save-scenario-btn" class="secondary-button" type="button">Save current scenario</button>
          <button id="load-scenario-btn" class="ghost-button" type="button" disabled>Load selected scenario</button>
          <button id="delete-scenario-btn" class="ghost-button" type="button" disabled>Delete selected scenario</button>
        </div>

        <div class="scenario-layout">
          <div class="scenario-stack">
            <div class="local-state-card scenario-card">
              <label class="field">
                <span>Scenario name</span>
                <input
                  id="scenario-name"
                  type="text"
                  maxlength="80"
                  placeholder="e.g. high carbon / low crude"
                  autocomplete="off"
                />
              </label>
              <div class="scenario-current-meta">
                <span class="subtle">Current</span>
                <strong id="active-scenario-name">Untitled current scenario</strong>
              </div>
            </div>

            <div class="local-state-card scenario-card">
              <label class="field">
                <span>Saved scenarios</span>
                <select id="scenario-list" class="scenario-select" aria-label="Saved scenarios">
                  <option value="">None selected</option>
                </select>
              </label>
            </div>
          </div>

          <div class="local-state-card scenario-card compare-summary-card">
            <div class="local-state-head">
              <strong>Diff summary</strong>
              <span class="subtle">current vs selected</span>
            </div>
            <div class="scenario-summary" id="scenario-summary"></div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="/_shared/layout.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
