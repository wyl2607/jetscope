<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFvsOil · Routes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-theme="light" data-page="routes">
    <div id="site-header"></div>

    <main class="page-main">
      <section class="page-hero">
        <p class="eyebrow">Routes · Library</p>
        <h1>SAF pathway full view</h1>
        <p class="hero-copy">7 SAF pathways + Jet-A with editable per-route baseline fields.</p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Pathway table</h2>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>Pathway</th>
                <th>Base cost ($/L)</th>
                <th>CO₂ savings (kg/L)</th>
                <th>Effective cost ($/L)</th>
                <th>Gap vs conventional</th>
                <th>Break-even crude</th>
                <th>Competitiveness</th>
              </tr>
            </thead>
            <tbody id="routes-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div id="breakeven-route-list" aria-live="polite"></div>
      </section>

      <section class="panel">
        <p class="subtle">
          Detail examples: <a href="/en/routes/sugar-atj">/en/routes/sugar-atj</a>,
          <a href="/en/routes/reed-hefa">/en/routes/reed-hefa</a>
        </p>
      </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="/_shared/layout.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
