name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify web and API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        working-directory: apps/api
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest

      - name: Run Node contract tests
        run: npm test

      - name: Run security audit gate
        run: npm run audit:security

      - name: Typecheck web app
        run: npm --prefix apps/web run typecheck

      - name: Build web app
        run: npm --prefix apps/web run build

      - name: Compile API
        run: npm run api:check

      - name: Run API tests
        working-directory: apps/api
        run: python -m pytest
