name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify web and API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        working-directory: apps/api
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest pip-audit

      - name: Run Node contract tests
        run: npm test

      - name: Run security audit gate
        run: npm run audit:security

      - name: Run Python dependency audit
        run: npm run audit:python

      - name: Typecheck web app
        run: npm --prefix apps/web run typecheck

      - name: Build web app
        run: npm --prefix apps/web run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run product smoke preflight
        run: npm run preflight:product

      - name: Run browser UI E2E preflight
        run: npm run preflight:e2e

      - name: Compile API
        run: npm run api:check

      - name: Check OpenAPI schema drift
        run: npm run api:openapi:check

      - name: Run API tests
        working-directory: apps/api
        run: python -m pytest

      - name: Upload UI E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-artifacts
          path: test-results/ui-e2e-artifacts/
          if-no-files-found: ignore
