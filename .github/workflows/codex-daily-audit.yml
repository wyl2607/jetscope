name: Codex Daily Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "18 6 * * *"

permissions:
  contents: read

jobs:
  read-only-audit:
    name: Read-only maintenance audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODEX_AUDIT_HAS_API_KEY: ${{ secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run Codex read-only audit
        if: ${{ env.CODEX_AUDIT_HAS_API_KEY == 'true' }}
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/codex-daily-audit.md
          output-file: codex-daily-audit.md
          sandbox: read-only
          safety-strategy: read-only

      - name: Write skipped audit artifact
        if: ${{ env.CODEX_AUDIT_HAS_API_KEY != 'true' }}
        run: |
          cat > codex-daily-audit.md <<'AUDIT'
          # Codex Daily Audit

          Skipped because the `OPENAI_API_KEY` repository secret is not configured.
          Configure that secret to enable the scheduled Codex maintenance audit.
          AUDIT

      - name: Upload audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-daily-audit
          path: codex-daily-audit.md
          if-no-files-found: error
