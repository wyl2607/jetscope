name: Maintenance Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run Semgrep
        run: semgrep scan --config auto --error

  prose-and-markdown:
    name: Vale and markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install markdownlint
        run: npm install --global markdownlint-cli2

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#tools/automation/runtime" "#archive" "#docs/archive"

      - name: Install Vale
        run: |
          curl -sSfL https://github.com/errata-ai/vale/releases/download/v3.12.0/vale_3.12.0_Linux_64-bit.tar.gz -o vale.tar.gz
          tar -xzf vale.tar.gz vale
          sudo mv vale /usr/local/bin/vale

      - name: Run Vale
        run: vale --minAlertLevel=error .
